<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .title-bar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }
      .text { font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; }
      .text-white { fill: #cdd6f4; }
      .text-dim { fill: #6c7086; }
      .text-green { fill: #a6e3a1; }
      .text-red { fill: #f38ba8; }
      .text-yellow { fill: #f9e2af; }
      .text-blue { fill: #89b4fa; }
      .text-cyan { fill: #94e2d5; }
      .text-mauve { fill: #cba6f7; }
      .box-line { fill: #585b70; }
      .title-text { fill: #cdd6f4; font-size: 12px; font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect class="bg" width="680" height="520" rx="10"/>
  <rect class="title-bar" width="680" height="36" rx="10"/>
  <rect class="title-bar" y="26" width="680" height="10"/>

  <!-- Traffic lights -->
  <circle class="dot-red" cx="20" cy="18" r="6"/>
  <circle class="dot-yellow" cx="40" cy="18" r="6"/>
  <circle class="dot-green" cx="60" cy="18" r="6"/>
  <text class="title-text" x="340" y="22" text-anchor="middle">judges eval src/api.ts</text>

  <!-- Command -->
  <text class="text text-dim" x="16" y="62">$</text>
  <text class="text text-green" x="28" y="62">judges eval src/api.ts</text>

  <!-- Box top -->
  <text class="text box-line" x="16" y="88">╔══════════════════════════════════════════════════════════╗</text>
  <text class="text box-line" x="16" y="106">║</text>
  <text class="text text-cyan" x="120" y="106">Judges Panel — Evaluation Result</text>
  <text class="text box-line" x="618" y="106">║</text>
  <text class="text box-line" x="16" y="124">╚══════════════════════════════════════════════════════════╝</text>

  <!-- Stats -->
  <text class="text text-dim" x="32" y="152">Verdict  :</text>
  <text class="text text-red" x="140" y="152">FAIL</text>
  <text class="text text-dim" x="32" y="170">Score    :</text>
  <text class="text text-yellow" x="140" y="170">62/100</text>
  <text class="text text-dim" x="32" y="188">Critical :</text>
  <text class="text text-red" x="140" y="188">3</text>
  <text class="text text-dim" x="32" y="206">High     :</text>
  <text class="text text-yellow" x="140" y="206">5</text>
  <text class="text text-dim" x="32" y="224">Findings :</text>
  <text class="text text-white" x="140" y="224">12</text>
  <text class="text text-dim" x="32" y="242">Judges   :</text>
  <text class="text text-white" x="140" y="242">35</text>

  <!-- Separator -->
  <text class="text text-dim" x="32" y="266">Per-Judge Breakdown:</text>
  <text class="text text-dim" x="32" y="282">────────────────────────────────────────────────────</text>

  <!-- Judge rows -->
  <text class="text text-white" x="32" y="300">❌ Cybersecurity</text>
  <text class="text text-red"   x="340" y="300">  25/100</text>
  <text class="text text-dim"   x="470" y="300">3 finding(s)</text>

  <text class="text text-white" x="32" y="318">❌ Authentication</text>
  <text class="text text-red"   x="340" y="318">  40/100</text>
  <text class="text text-dim"   x="470" y="318">2 finding(s)</text>

  <text class="text text-white" x="32" y="336">⚠️  Configuration Management</text>
  <text class="text text-yellow" x="340" y="336">  65/100</text>
  <text class="text text-dim"    x="470" y="336">2 finding(s)</text>

  <text class="text text-white" x="32" y="354">⚠️  Error Handling</text>
  <text class="text text-yellow" x="340" y="354">  72/100</text>
  <text class="text text-dim"    x="470" y="354">1 finding(s)</text>

  <text class="text text-white" x="32" y="372">✅ API Design</text>
  <text class="text text-green"  x="340" y="372"> 100/100</text>
  <text class="text text-dim"    x="470" y="372">0 finding(s)</text>

  <text class="text text-white" x="32" y="390">✅ Performance</text>
  <text class="text text-green"  x="340" y="390"> 100/100</text>
  <text class="text text-dim"    x="470" y="390">0 finding(s)</text>

  <text class="text text-dim"   x="32" y="408">    ... 29 more judges (all passing)</text>

  <!-- Findings section -->
  <text class="text text-dim"   x="32" y="434">Critical &amp; High Findings:</text>
  <text class="text text-dim"   x="32" y="450">────────────────────────────────────────────────────</text>
  <text class="text text-red"   x="32" y="468">[CRITICAL] SEC-001: SQL Injection via string concat</text>
  <text class="text text-red"   x="32" y="486">[CRITICAL] SEC-003: Hardcoded API key in source</text>
  <text class="text text-yellow" x="32" y="504">[HIGH    ] AUTH-001: No authentication middleware</text>
</svg>
