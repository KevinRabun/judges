name: Judges Panel Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  judges:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Judges (deterministic + SARIF)
        run: |
          npx judges eval --format sarif --output artifacts/judges.sarif --min-severity=medium || true
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/judges.sarif

      - name: Enforce severity gate
        run: |
          npx judges ai-gate --sarif artifacts/judges.sarif --max-severity high

      - name: Optional LLM Deep Review (autopilot)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx judges review --pr ${{ github.event.pull_request.number }} --llm-deep-review --autopilot --min-severity=medium

      - name: Optional auto-fix preview
        continue-on-error: true
        run: |
          npx judges fix . --rule CYBER --severity high --dry-run

