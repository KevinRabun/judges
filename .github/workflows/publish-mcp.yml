name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Publish npm package ──────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package to npm
        run: |
          npm publish --provenance --access public || {
            if npm view "@kevinrabun/judges@$(node -p 'require("./package.json").version')" version > /dev/null 2>&1; then
              echo "Version already published to npm — skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release (skip if already exists) ───────

      - name: Create GitHub Release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping creation"
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish to MCP Registry ─────────────────────────────

      - name: Install mcp-publisher
        run: |
          curl -L \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

      # ── Publish VS Code Extension to Marketplace ────────────

      - name: Sync extension version with package version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd vscode-extension
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.version = '${VERSION}';
            pkg.dependencies['@kevinrabun/judges'] = '^${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install extension dependencies
        run: |
          cd vscode-extension
          npm install

      - name: Publish extension to VS Code Marketplace
        run: |
          cd vscode-extension
          npx @vscode/vsce publish --no-git-tag-version --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
