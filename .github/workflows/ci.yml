# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.0

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-workflows
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Typecheck
        run: npx tsc --noEmit
        env:
          CI: true

      - name: Lint
        run: npm run lint
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Judges eval (SARIF)
        run: node packages/judges-cli/bin/judges.js eval src --format sarif --output artifacts/judges.sarif --min-severity=medium --max-files 3 || true
        env:
          CI: true

      - name: Judges severity gate
        run: |
          node -e "
            const fs = require('fs');
            const sarif = JSON.parse(fs.readFileSync('artifacts/judges.sarif', 'utf-8'));
            const runs = sarif.runs || [];
            const results = runs.flatMap(r => r.results || []);
            if (runs.length === 0) { console.error('Severity gate failed: no SARIF runs produced'); process.exit(1); }
            if (results.length === 0) { console.error('Severity gate failed: 0 findings — judges may not be running'); process.exit(1); }
            console.log('Severity gate passed (' + results.length + ' finding(s) across ' + runs.length + ' run(s))');
          "
        env:
          CI: true

      - name: Test
        shell: bash
        run: |
          shopt -s globstar
          set +e
          node --import tsx --test ${{ matrix.node-version >= 22 && '--test-force-exit' || '' }} tests/**/*.test.ts 2>&1 | tee test-output.log
          EXIT_CODE=$?
          set -e
          # Node 22 + tsx triggers a spurious "Unable to deserialize cloned data"
          # uncaughtException after all tests pass. Verify actual results.
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All tests passed"
          elif grep -q 'deserialize cloned data' test-output.log && grep -q '# fail 1' test-output.log; then
            echo "All real tests passed. Ignoring tsx/Node serialization artifact."
          else
            echo "::error::Tests failed with exit code $EXIT_CODE"
            exit 1
          fi
        env:
          CI: true

      - name: Test with coverage (Node 22 only)
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          CI: true

      - name: Link check (README only)
        if: matrix.node-version == '22'
        run: |
          npx linkinator README.md --markdown true --verbosity WARNING --skip 'localhost'
        env:
          CI: true

      - name: Upload coverage artifacts
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
          if-no-files-found: warn

      - name: Upload SARIF artifact
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: judges-sarif
          path: artifacts/judges.sarif
          if-no-files-found: warn

  # ── Tier 2: LLM-enhanced deep review (PR merges to main only) ───────────
  # Runs the full tribunal with LLM augmentation on changed files only.
  # This catches semantic/logic issues that deterministic eval misses.
  llm-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Compute PR diff
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1 2>/dev/null || true
          git diff "origin/$GITHUB_BASE_REF"...HEAD --name-only -- '*.ts' '*.js' '*.py' '*.go' '*.java' '*.cs' '*.rs' > /tmp/changed-files.txt
          echo "Changed source files:"
          cat /tmp/changed-files.txt
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: LLM-enhanced tribunal review (changed files)
        run: |
          set -euo pipefail
          MAX_LLM_FILES=10
          FILE_COUNT=$(wc -l < /tmp/changed-files.txt)
          echo "Evaluating up to $MAX_LLM_FILES of $FILE_COUNT changed files with deep review"

          # Evaluate changed files with escalation threshold for human routing
          head -n "$MAX_LLM_FILES" /tmp/changed-files.txt | while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "::group::Deep review: $file"
              node packages/judges-cli/bin/judges.js eval --file "$file" \
                --format sarif \
                --preset strict \
                --min-confidence 0.5 2>&1 || true
              echo "::endgroup::"
            fi
          done

          # Full diff-based analysis for merge gating
          git diff "origin/$GITHUB_BASE_REF"...HEAD > /tmp/pr.diff 2>/dev/null || true
          if [ -s /tmp/pr.diff ]; then
            node packages/judges-cli/bin/judges.js diff --file /tmp/pr.diff \
              --format json \
              --output artifacts/pr-deep-review.json 2>&1 || true
          fi
        env:
          CI: true
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: PR review gate
        run: |
          node -e "
            const fs = require('fs');
            const path = 'artifacts/pr-deep-review.json';
            if (!fs.existsSync(path)) { console.log('No deep review results — skipping gate'); process.exit(0); }
            const results = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const findings = results.findings || [];
            const critical = findings.filter(f => f.severity === 'critical').length;
            const high = findings.filter(f => f.severity === 'high').length;
            const escalated = findings.filter(f => f.needsHumanReview).length;
            console.log('Deep review: ' + findings.length + ' finding(s), ' + critical + ' critical, ' + high + ' high, ' + escalated + ' escalated to human');
            if (critical > 0) {
              console.error('::error::PR blocked: ' + critical + ' critical finding(s) in deep review');
              process.exit(1);
            }
            if (escalated > 0) {
              console.log('::warning::' + escalated + ' finding(s) flagged for human review — require manual approval');
            }
          "
        env:
          CI: true

      - name: Upload PR review artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-deep-review
          path: artifacts/pr-deep-review.json
          if-no-files-found: warn
