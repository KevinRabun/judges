name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: actionlint
        uses: rhysd/actionlint@v1.7.11

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-workflows
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Typecheck
        run: npx tsc --noEmit
        env:
          CI: true

      - name: Lint
        run: npm run lint
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Test
        shell: bash
        run: |
          shopt -s globstar
          set +e
          node --import tsx --test ${{ matrix.node-version >= 22 && '--test-force-exit' || '' }} tests/**/*.test.ts 2>&1 | tee test-output.log
          EXIT_CODE=$?
          set -e
          # Node 22 + tsx triggers a spurious "Unable to deserialize cloned data"
          # uncaughtException after all tests pass. Verify actual results.
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All tests passed"
          elif grep -q 'deserialize cloned data' test-output.log && grep -q '# fail 1' test-output.log; then
            echo "All real tests passed. Ignoring tsx/Node serialization artifact."
          else
            echo "::error::Tests failed with exit code $EXIT_CODE"
            exit 1
          fi
        env:
          CI: true

      - name: Test with coverage (Node 22 only)
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          CI: true

      - name: Link check (README only)
        if: matrix.node-version == '22'
        run: |
          npx linkinator README.md --markdown true --verbosity WARNING --skip 'localhost'
        env:
          CI: true

      - name: Upload coverage artifacts
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
          if-no-files-found: warn


