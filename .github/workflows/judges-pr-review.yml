name: Judges PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  judges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Judges inline PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node dist/cli.js review \
            --pr ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --min-severity medium \
            --max-comments 25 \
            --calibrate \
            --format json > judges-review-result.json 2>&1 || true

      - name: Read review result
        id: review_result
        run: |
          if [ -f judges-review-result.json ] && jq -e '.filesAnalyzed' judges-review-result.json > /dev/null 2>&1; then
            echo "files=$(jq -r '.filesAnalyzed' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "findings=$(jq -r '.totalFindings' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "comments=$(jq -r '.commentsPosted' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "approved=$(jq -r '.approved' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "critical=$(jq -r '.criticalCount' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "high=$(jq -r '.highCount' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "suppressed=$(jq -r '.fpSuppressed' judges-review-result.json)" >> "$GITHUB_OUTPUT"
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fallback — Generate full repo report
        if: steps.review_result.outputs.success != 'true'
        run: |
          npx tsx -e "import { writeFileSync } from 'node:fs';
          import { generateRepoReportFromLocalPath } from './src/reports/public-repo-report.ts';
          const result = generateRepoReportFromLocalPath({
            repoPath: process.cwd(),
            outputPath: 'judges-pr-report.md',
            maxFiles: 300,
            maxFileBytes: 220000,
            maxFindingsInReport: 100,
            excludePathRegexes: [
              '(^|/)test(s)?(/|$)',
              '(^|/)__tests__(/|$)',
              '(^|/)spec(s)?(/|$)',
              '\\.(test|spec)\\.',
              '(^|/)docs(/|$)',
              '(^|/)examples?(/|$)',
              '(^|/)fixtures?(/|$)',
              '(^|/)mocks?(/|$)',
            ],
            includeAstFindings: false,
            minConfidence: 0.9,
          });
          writeFileSync('judges-summary.json', JSON.stringify({
            overallVerdict: result.overallVerdict,
            averageScore: result.averageScore,
            totalFindings: result.totalFindings,
            analyzedFileCount: result.analyzedFileCount,
          }, null, 2));"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: judges-pr-report
          path: |
            judges-pr-report.md
            judges-review-result.json
          if-no-files-found: ignore

      - name: Post Judges summary comment
        uses: actions/github-script@v8
        env:
          REVIEW_SUCCESS: ${{ steps.review_result.outputs.success }}
          REVIEW_FILES: ${{ steps.review_result.outputs.files }}
          REVIEW_FINDINGS: ${{ steps.review_result.outputs.findings }}
          REVIEW_COMMENTS: ${{ steps.review_result.outputs.comments }}
          REVIEW_APPROVED: ${{ steps.review_result.outputs.approved }}
          REVIEW_CRITICAL: ${{ steps.review_result.outputs.critical }}
          REVIEW_HIGH: ${{ steps.review_result.outputs.high }}
          REVIEW_SUPPRESSED: ${{ steps.review_result.outputs.suppressed }}
        with:
          script: |
            const marker = '<!-- judges-pr-summary -->';
            const success = process.env.REVIEW_SUCCESS === 'true';

            let body;
            if (success) {
              const approved = process.env.REVIEW_APPROVED === 'true';
              const badge = approved ? '✅' : '❌';
              const verdict = approved ? 'APPROVED' : 'CHANGES REQUESTED';
              const suppressed = parseInt(process.env.REVIEW_SUPPRESSED || '0', 10);
              const parts = [
                `${marker}`,
                `## ${badge} Judges PR Review`,
                '',
                `- Verdict: **${verdict}**`,
                `- Files analyzed: **${process.env.REVIEW_FILES}**`,
                `- Total findings: **${process.env.REVIEW_FINDINGS}**`,
                `- Inline comments: **${process.env.REVIEW_COMMENTS}**`,
              ];
              if (parseInt(process.env.REVIEW_CRITICAL || '0', 10) > 0)
                parts.push(`- 🔴 Critical: **${process.env.REVIEW_CRITICAL}**`);
              if (parseInt(process.env.REVIEW_HIGH || '0', 10) > 0)
                parts.push(`- 🟠 High: **${process.env.REVIEW_HIGH}**`);
              if (suppressed > 0)
                parts.push(`- 🧪 FP-suppressed: **${suppressed}**`);
              parts.push('', '*Powered by [Judges Panel](https://github.com/KevinRabun/judges)*');
              body = parts.join('\n');
            } else {
              body = `${marker}\n## ⚠️ Judges PR Review\n\nInline review failed — see workflow artifact for full report.\n\n*Powered by [Judges Panel](https://github.com/KevinRabun/judges)*`;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body?.includes(marker) && c.user?.type === 'Bot');

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
