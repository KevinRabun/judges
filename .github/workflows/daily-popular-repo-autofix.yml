name: Judges Daily Full-Run Autofix PRs

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      targetRepoUrl:
        description: "Optional explicit repository URL to analyze"
        required: false
        type: string
      dryRun:
        description: "Prepare fixes without creating PRs"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  analyze-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout judges repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run daily popular-repo autofix
        env:
          GH_TOKEN: ${{ secrets.JUDGES_AUTOFIX_GH_TOKEN }}
          TARGET_REPO_URL: ${{ inputs.targetRepoUrl }}
          MAX_PRS: "5"
          MAX_REPOS_PER_DAY: "3"
          MIN_CONFIDENCE: "0.9"
          PER_REPO_TIMEOUT_MINUTES: "15"
          INCLUDE_TOTAL_FINDINGS_SCAN: "false"
          ENABLE_FALLBACK: "false"
          DRY_RUN: ${{ inputs.dryRun }}
          SUMMARY_PATH: "daily-autofix-summary.json"
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "JUDGES_AUTOFIX_GH_TOKEN is not configured; exiting without failure."
            echo '{"skipped":["Missing JUDGES_AUTOFIX_GH_TOKEN secret."]}' > daily-autofix-summary.json
            exit 0
          fi

          echo "Running Judges autofix against popular AI/ML repos (15m per-repo timeout, max 3 repos)."
          npx tsx scripts/daily-popular-repo-autofix.ts

      - name: Upload automation summary
        uses: actions/upload-artifact@v7
        with:
          name: daily-autofix-summary
          path: daily-autofix-summary.json
