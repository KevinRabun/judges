name: "Judges Code Review"
description: "Run 37 specialized judges against your code — security, cost, scalability, accessibility, compliance, and 32 more dimensions. Deterministic evaluators + expert-persona LLM prompts. Zero config, instant results."
author: "kevinrabun"

branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "File or directory to analyze"
    required: false
    default: "."
  language:
    description: "Source language (auto-detected from extension if omitted)"
    required: false
  judge:
    description: "Run a single judge instead of the full tribunal (e.g., cybersecurity, authentication)"
    required: false
  preset:
    description: "Named preset: strict, lenient, security-only, startup, compliance, performance"
    required: false
  config:
    description: "Path to a .judgesrc.json configuration file"
    required: false
  format:
    description: "Output format: text, json, sarif, markdown, html, junit, codeclimate"
    required: false
    default: "text"
  fix:
    description: "Automatically apply machine-applicable patches from findings"
    required: false
    default: "false"
  max-files:
    description: "Maximum number of files to analyze when path is a directory"
    required: false
    default: "300"
  min-confidence:
    description: "Minimum finding confidence to include (0-1)"
    required: false
    default: "0"
  upload-sarif:
    description: "Upload SARIF results to GitHub Code Scanning (requires security-events: write)"
    required: false
    default: "false"
  fail-on-findings:
    description: "Fail the action if critical or high findings are detected"
    required: false
    default: "false"
  pr-review:
    description: "Post findings as inline PR review comments on changed lines (requires pull-requests: write)"
    required: false
    default: "false"
  diff-only:
    description: "Only evaluate changed lines in a PR (requires pull-requests: read). Dramatically reduces noise."
    required: false
    default: "false"
  baseline-file:
    description: "Path to a .judges-baseline.json file. Only new findings (not in baseline) are reported."
    required: false
    default: ""
  exclude:
    description: "Glob patterns to exclude files (comma-separated, e.g. '**/*.test.ts,**/fixtures/**')"
    required: false
    default: ""
  include:
    description: "Glob patterns to include only matching files (comma-separated, e.g. '**/*.py,**/*.ts')"
    required: false
    default: ""

outputs:
  verdict:
    description: "Overall verdict: PASS, WARNING, or FAIL"
    value: ${{ steps.run.outputs.verdict }}
  score:
    description: "Overall score (0-100)"
    value: ${{ steps.run.outputs.score }}
  findings:
    description: "Total number of findings"
    value: ${{ steps.run.outputs.findings }}
  critical:
    description: "Number of critical findings"
    value: ${{ steps.run.outputs.critical }}
  high:
    description: "Number of high findings"
    value: ${{ steps.run.outputs.high }}
  sarif-file:
    description: "Path to the generated SARIF file (when upload-sarif is true)"
    value: ${{ steps.run.outputs.sarif_file }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Install Judges
      shell: bash
      run: npm install -g @kevinrabun/judges@latest

    - name: Run Judges analysis
      id: run
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_JUDGE: ${{ inputs.judge }}
        INPUT_PRESET: ${{ inputs.preset }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FIX: ${{ inputs.fix }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        INPUT_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        INPUT_DIFF_ONLY: ${{ inputs.diff-only }}
        INPUT_BASELINE_FILE: ${{ inputs.baseline-file }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_INCLUDE: ${{ inputs.include }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # ── Diff-only mode: evaluate only changed files/lines in a PR ──
        if [ "$INPUT_DIFF_ONLY" = "true" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
          echo "::group::Diff-only mode: evaluating changed files"
          git fetch origin "$GITHUB_BASE_REF" --depth=1 2>/dev/null || true
          git diff "origin/$GITHUB_BASE_REF"...HEAD > /tmp/judges-pr.diff 2>/dev/null || true

          if [ -s /tmp/judges-pr.diff ]; then
            judges diff --file /tmp/judges-pr.diff --format json > judges-results.json 2>&1 || true
          else
            echo '{"files":[],"totalFindings":0,"worstScore":100}' > judges-results.json
          fi
          echo "::endgroup::"
        else
          ARGS=()

          # Determine if path is file or directory
          if [ -f "$INPUT_PATH" ]; then
            ARGS+=(eval --file "$INPUT_PATH")
          elif [ -d "$INPUT_PATH" ]; then
            echo "::group::Analyzing directory: $INPUT_PATH"
            REPORT_ARGS=(
              npx tsx "$(npm root -g)/@kevinrabun/judges/scripts/generate-public-repo-report.ts"
              --repoUrl "file://$INPUT_PATH"
              --quickStart
              --maxFiles "$INPUT_MAX_FILES"
              --output judges-report.md
            )
            if [ -n "$INPUT_MIN_CONFIDENCE" ] && [ "$INPUT_MIN_CONFIDENCE" != "0" ]; then
              REPORT_ARGS+=(--minConfidence "$INPUT_MIN_CONFIDENCE")
            fi
            "${REPORT_ARGS[@]}" 2>&1 || true
            echo "::endgroup::"
            if [ -f judges-report.md ]; then
              echo "verdict=WARNING" >> "$GITHUB_OUTPUT"
              echo "score=0" >> "$GITHUB_OUTPUT"
              echo "findings=0" >> "$GITHUB_OUTPUT"
              echo "critical=0" >> "$GITHUB_OUTPUT"
              echo "high=0" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          else
            echo "::error::Path not found: $INPUT_PATH"
            exit 1
          fi

          if [ -n "$INPUT_LANGUAGE" ]; then ARGS+=(--language "$INPUT_LANGUAGE"); fi
          if [ -n "$INPUT_JUDGE" ]; then ARGS+=(--judge "$INPUT_JUDGE"); fi
          if [ -n "$INPUT_PRESET" ]; then ARGS+=(--preset "$INPUT_PRESET"); fi
          if [ -n "$INPUT_CONFIG" ]; then ARGS+=(--config "$INPUT_CONFIG"); fi
          if [ "$INPUT_FIX" = "true" ]; then ARGS+=(--fix); fi
          if [ -n "$INPUT_EXCLUDE" ]; then
            IFS=',' read -ra EXCLUDE_PATTERNS <<< "$INPUT_EXCLUDE"
            for pat in "${EXCLUDE_PATTERNS[@]}"; do
              ARGS+=(--exclude "$(echo "$pat" | xargs)")
            done
          fi
          if [ -n "$INPUT_INCLUDE" ]; then
            IFS=',' read -ra INCLUDE_PATTERNS <<< "$INPUT_INCLUDE"
            for pat in "${INCLUDE_PATTERNS[@]}"; do
              ARGS+=(--include "$(echo "$pat" | xargs)")
            done
          fi

          judges "${ARGS[@]}" --format json > judges-results.json 2>&1 || true
        fi

        # ── Baseline filtering: suppress known findings ──
        if [ -n "$INPUT_BASELINE_FILE" ] && [ -f "$INPUT_BASELINE_FILE" ]; then
          echo "::group::Filtering against baseline: $INPUT_BASELINE_FILE"
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('judges-results.json', 'utf8'));
            const baseline = JSON.parse(fs.readFileSync('$INPUT_BASELINE_FILE', 'utf8'));
            const baselineKeys = new Set(
              (baseline.findings || []).map(f => f.ruleId + ':' + (f.lineNumbers || []).sort().join(','))
            );
            const allFindings = results.findings || (results.files || []).flatMap(f => (f.verdict?.findings || []));
            const newFindings = allFindings.filter(f => {
              const key = f.ruleId + ':' + (f.lineNumbers || []).sort().join(',');
              return !baselineKeys.has(key);
            });
            results.findings = newFindings;
            results._baselineFiltered = allFindings.length - newFindings.length;
            fs.writeFileSync('judges-results.json', JSON.stringify(results, null, 2));
            console.log('Baseline: suppressed ' + (allFindings.length - newFindings.length) + ' known findings, ' + newFindings.length + ' new findings remain');
          " 2>&1 || true
          echo "::endgroup::"
        fi

        # ── Extract scores ──
        VERDICT=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); console.log(r.verdict||r.overallVerdict||'UNKNOWN')" 2>/dev/null || echo "UNKNOWN")
        SCORE=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); console.log(r.score||r.overallScore||r.worstScore||0)" 2>/dev/null || echo "0")
        TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); const f=r.findings||(r.files||[]).flatMap(x=>(x.verdict?.findings||[])); console.log(f.length)" 2>/dev/null || echo "0")
        CRITICAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); const f=r.findings||(r.files||[]).flatMap(x=>(x.verdict?.findings||[])); console.log(f.filter(x=>x.severity==='critical').length)" 2>/dev/null || echo "0")
        HIGH=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); const f=r.findings||(r.files||[]).flatMap(x=>(x.verdict?.findings||[])); console.log(f.filter(x=>x.severity==='high').length)" 2>/dev/null || echo "0")

        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "findings=$TOTAL" >> "$GITHUB_OUTPUT"
        echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "high=$HIGH" >> "$GITHUB_OUTPUT"

        # Display results in requested format
        if [ "$INPUT_FORMAT" = "sarif" ] || [ "$INPUT_UPLOAD_SARIF" = "true" ]; then
          judges eval --file "$INPUT_PATH" --format sarif > judges-results.sarif 2>&1 || true
          echo "sarif_file=judges-results.sarif" >> "$GITHUB_OUTPUT"
        fi
        if [ "$INPUT_FORMAT" = "text" ]; then
          cat judges-results.json | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); const f=r.findings||(r.files||[]).flatMap(x=>(x.verdict?.findings||[])); f.forEach(x=>console.log('['+x.severity.toUpperCase()+'] '+x.ruleId+': '+x.title))"
        elif [ "$INPUT_FORMAT" = "markdown" ]; then
          cat judges-results.json | node -e "const r=JSON.parse(require('fs').readFileSync(0,'utf8')); const f=r.findings||(r.files||[]).flatMap(x=>(x.verdict?.findings||[])); f.forEach(x=>console.log('- **['+x.severity.toUpperCase()+']** \`'+x.ruleId+'\`: '+x.title))"
        elif [ "$INPUT_FORMAT" = "sarif" ]; then
          cat judges-results.sarif 2>/dev/null || true
        else
          cat judges-results.json
        fi

        # Summary annotation
        BASELINE_NOTE=""
        if [ -n "$INPUT_BASELINE_FILE" ] && [ -f "$INPUT_BASELINE_FILE" ]; then
          BASELINE_SUPPRESSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('judges-results.json','utf8')); console.log(r._baselineFiltered||0)" 2>/dev/null || echo "0")
          BASELINE_NOTE=" (${BASELINE_SUPPRESSED} baseline findings suppressed)"
        fi
        DIFF_NOTE=""
        if [ "$INPUT_DIFF_ONLY" = "true" ]; then
          DIFF_NOTE=" (diff-only mode)"
        fi

        echo "### 🔍 Judges Code Review${DIFF_NOTE}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Verdict | **$VERDICT** |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Score | $SCORE/100 |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Total Findings | $TOTAL${BASELINE_NOTE} |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
        echo "| High | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR review comments
      if: inputs.pr-review == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail

        if [ ! -f judges-results.json ]; then
          echo "No results file found — skipping PR review"
          exit 0
        fi

        # Generate PR review comments from findings using the GitHub API
        node -e "
          const https = require('https');
          const fs = require('fs');

          const results = JSON.parse(fs.readFileSync('judges-results.json', 'utf8'));
          const findings = results.findings || (results.files || []).flatMap(f => {
            const filePath = f.file || '';
            return (f.verdict?.findings || []).map(v => ({ ...v, _file: filePath }));
          });

          if (findings.length === 0) {
            console.log('No findings to post as PR comments.');
            process.exit(0);
          }

          const repo = process.env.GITHUB_REPOSITORY;
          const prNumber = process.env.PR_NUMBER;
          const token = process.env.GITHUB_TOKEN;

          // Map severity to emoji
          const severityIcon = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };

          // Build review comments (max 50 to avoid API limits)
          const comments = [];
          for (const f of findings.slice(0, 50)) {
            const filePath = f._file || f.filePath || results.filePath || '';
            const line = (f.lineNumbers && f.lineNumbers[0]) || 1;
            if (!filePath) continue;

            const icon = severityIcon[f.severity] || '⚪';
            let body = icon + ' **' + f.severity.toUpperCase() + '** \`' + f.ruleId + '\`: ' + f.title + '\n\n';
            body += f.description + '\n\n';
            if (f.recommendation) body += '**Recommendation:** ' + f.recommendation + '\n\n';
            if (f.suggestedFix) body += '**Suggested Fix:**\n\`\`\`\n' + f.suggestedFix + '\n\`\`\`\n';
            if (f.reference) body += '📚 ' + f.reference + '\n';

            comments.push({ path: filePath, line: line, body: body });
          }

          if (comments.length === 0) {
            console.log('No comments with file paths to post.');
            process.exit(0);
          }

          // Post as a PR review via the GitHub API
          const reviewBody = JSON.stringify({
            event: findings.some(f => f.severity === 'critical') ? 'REQUEST_CHANGES' : 'COMMENT',
            body: '## 🔍 Judges Code Review\n\nFound **' + findings.length + '** finding(s). See inline comments below.\n\n' +
              (findings.length > 50 ? '> ⚠️ Showing top 50 of ' + findings.length + ' findings.\n' : ''),
            comments: comments,
          });

          const options = {
            hostname: 'api.github.com',
            path: '/repos/' + repo + '/pulls/' + prNumber + '/reviews',
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'judges-action',
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(reviewBody),
            },
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              if (res.statusCode >= 200 && res.statusCode < 300) {
                console.log('✅ Posted PR review with ' + comments.length + ' inline comment(s)');
              } else {
                console.error('⚠️ PR review API returned ' + res.statusCode + ': ' + data);
                // Don't fail the action — review comments are best-effort
              }
            });
          });
          req.on('error', (e) => console.error('⚠️ PR review request failed:', e.message));
          req.write(reviewBody);
          req.end();
        "

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && steps.run.outputs.sarif_file != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.run.outputs.sarif_file }}

    - name: Fail on critical/high findings
      if: inputs.fail-on-findings == 'true'
      shell: bash
      run: |
        CRITICAL="${{ steps.run.outputs.critical }}"
        HIGH="${{ steps.run.outputs.high }}"
        if [ "${CRITICAL:-0}" -gt 0 ] || [ "${HIGH:-0}" -gt 0 ]; then
          echo "::error::Judges found $CRITICAL critical and $HIGH high findings"
          exit 1
        fi
